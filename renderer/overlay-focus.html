<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
    <title>Iris overlay</title>
    <style>
      html {
        position: fixed;
        inset: 0;
        overflow: hidden !important;
        margin: 0;
        padding: 0;
        background: transparent;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overscroll-behavior: none;
        height: 100%;
        max-height: 100%;
      }
      body {
        position: fixed;
        inset: 0;
        overflow: hidden !important;
        margin: 0;
        padding: 0;
        background: transparent;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overscroll-behavior: none;
        height: 100%;
        max-height: 100%;
        touch-action: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      #cv {
        display: block;
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
        touch-action: none;
        /* Bitmap size is set in JS; CSS keeps display within viewport (no vertical/horizontal overflow). */
      }
    </style>
  </head>
  <body>
    <canvas id="cv"></canvas>
    <script src="overlay-focus.js"></script>
  </body>
</html>
